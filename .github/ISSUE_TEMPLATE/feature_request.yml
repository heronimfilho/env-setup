name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or user problem should be improved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and recovery considerations
      description: Consider idempotency, backups, secrets, reboots, and interruption.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
