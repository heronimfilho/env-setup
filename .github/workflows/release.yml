name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate tag and release manifest
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          if [[ "$tag" != "$version" ]]; then
            echo "Tag v$tag does not match VERSION $version" >&2
            exit 1
          fi
          python -m json.tool release-manifest.json > /dev/null
          manifest_version="$(python -c 'import json; print(json.load(open("release-manifest.json"))["version"])')"
          commit="$(python -c 'import json; print(json.load(open("release-manifest.json"))["commit"])')"
          checksum="$(python -c 'import json; print(json.load(open("release-manifest.json"))["archiveSha256"])')"
          if [[ "$manifest_version" != "$version" ]]; then
            echo "release-manifest.json version does not match VERSION" >&2
            exit 1
          fi
          printf 'version=%s\ncommit=%s\nchecksum=%s\n' "$version" "$commit" "$checksum" >> "$GITHUB_OUTPUT"

      - name: Build verified release assets
        shell: bash
        run: |
          set -euo pipefail
          commit="${{ steps.manifest.outputs.commit }}"
          expected="${{ steps.manifest.outputs.checksum }}"
          archive="env-setup-${{ steps.manifest.outputs.version }}.zip"
          curl -fsSL "https://codeload.github.com/${GITHUB_REPOSITORY}/zip/${commit}" -o "$archive"
          actual="$(sha256sum "$archive" | awk '{print $1}')"
          if [[ "$actual" != "$expected" ]]; then
            echo "Release archive checksum mismatch" >&2
            exit 1
          fi
          printf '%s  %s\n' "$actual" "$archive" > SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "env-setup-${{ steps.manifest.outputs.version }}.zip" \
            SHA256SUMS \
            --title "env-setup ${{ steps.manifest.outputs.version }}" \
            --notes-file docs/changelog.md \
            --verify-tag
