name: Validate

on:
  push:
    branches:
      - main
      - "fix/**"
  pull_request:

permissions:
  contents: read

jobs:
  powershell:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Filter *.ps1 -Recurse

          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null

            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }

  shell:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Bash syntax
        run: bash -n configure-zsh.sh tests/configure-zsh.test.sh

      - name: Run Zsh setup tests
        id: zsh-tests
        continue-on-error: true
        run: bash -x tests/configure-zsh.test.sh > zsh-test.log 2>&1

      - name: Upload Zsh test log
        if: steps.zsh-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: zsh-test-log
          path: zsh-test.log

      - name: Report Zsh test failure
        if: steps.zsh-tests.outcome == 'failure'
        run: |
          cat zsh-test.log
          exit 1

      - name: Validate JSON
        run: python -m json.tool vscode.settings.json > /dev/null
