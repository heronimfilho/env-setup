name: Validate

on:
  push:
    branches:
      - main
      - "fix/**"
  pull_request:

permissions:
  contents: read

jobs:
  powershell:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Filter *.ps1 -Recurse

          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null

            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }

      - name: Run setup core tests
        shell: powershell
        run: .\tests\core.test.ps1

  shell:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Bash syntax
        run: bash -n configure-zsh.sh tests/configure-zsh.test.sh

      - name: Run Zsh setup tests
        run: bash tests/configure-zsh.test.sh

      - name: Validate JSON
        run: python -m json.tool vscode.settings.json > /dev/null
