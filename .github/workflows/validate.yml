name: Validate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  powershell:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Filter *.ps1 -Recurse
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force
          $issues = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
          $issues | Format-Table -AutoSize
          if ($issues.Count -gt 0) { exit 1 }

      - name: Run setup core tests
        shell: powershell
        run: .\tests\core.test.ps1

      - name: Run runtime tests
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path test-diagnostics -Force | Out-Null
          try {
            & .\tests\runtime.test.ps1 *>&1 | Tee-Object -FilePath test-diagnostics\runtime.log
          }
          catch {
            $_ | Format-List * -Force | Out-String | Tee-Object -FilePath test-diagnostics\runtime-error.log
            exit 1
          }

      - name: Run task progress tests
        shell: powershell
        run: .\tests\progress.test.ps1

      - name: Run diagnostics tests
        shell: powershell
        run: .\tests\diagnostics.test.ps1

      - name: Run updater tests
        shell: powershell
        run: .\tests\update.test.ps1

      - name: Run setup integration tests
        shell: powershell
        run: .\tests\setup.test.ps1

      - name: Run Git configuration tests
        shell: powershell
        run: .\tests\git.test.ps1

      - name: Run Visual Studio Code tests
        shell: powershell
        run: .\tests\vscode.test.ps1

      - name: Run WSL task tests
        shell: powershell
        run: .\tests\wsl.test.ps1

      - name: Run shell configuration tests
        shell: powershell
        run: .\tests\shell.test.ps1

      - name: Run entrypoint tests
        shell: powershell
        run: .\tests\entrypoints.test.ps1

      - name: Upload PowerShell failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: powershell-failure-diagnostics
          path: test-diagnostics
          if-no-files-found: ignore
          retention-days: 7

  shell-and-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate Bash syntax
        run: bash -n configure-zsh.sh install-node.sh tests/configure-zsh.test.sh tests/node.test.sh

      - name: Run ShellCheck
        run: shellcheck configure-zsh.sh install-node.sh tests/configure-zsh.test.sh tests/node.test.sh

      - name: Run Zsh setup tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test-diagnostics
          bash tests/configure-zsh.test.sh 2>&1 | tee test-diagnostics/configure-zsh.log

      - name: Run NVM and Node setup tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test-diagnostics
          bash tests/node.test.sh 2>&1 | tee test-diagnostics/node.log

      - name: Validate JSON
        run: |
          find . -name '*.json' -print0 | while IFS= read -r -d '' file; do
            python -m json.tool "$file" > /dev/null
          done

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2@0.18.1 "**/*.md" "#.git/**"

      - name: Validate GitHub Actions
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Scan repository for common secret formats
        run: python tests/secret-scan.py

      - name: Calculate immutable archive checksum
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          head_sha="${PR_HEAD_SHA:-$GITHUB_SHA}"
          curl -fsSL "https://codeload.github.com/${GITHUB_REPOSITORY}/zip/${head_sha}" -o /tmp/env-setup.zip
          checksum="$(sha256sum /tmp/env-setup.zip | awk '{print $1}')"
          printf '{"commit":"%s","sha256":"%s"}\n' "$head_sha" "$checksum" > /tmp/archive-checksum.json
          cat /tmp/archive-checksum.json

      - name: Upload immutable archive checksum
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: immutable-archive-checksum
          path: /tmp/archive-checksum.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload shell failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: shell-failure-diagnostics
          path: test-diagnostics
          if-no-files-found: ignore
          retention-days: 7
